<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>{% block title %}Eventos Logísticos{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f0f4f8; font-size: 1rem; }
    .navbar { background: #1F4E79 !important; }
    .navbar-brand, .nav-link { color: #fff !important; }
    .btn-evento { font-size: 1.1rem; padding: 14px 10px; border-radius: 12px; }
    .card { border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .badge-tipo { font-size: .85rem; }
    .table-sm td, .table-sm th { font-size: .82rem; }
    .flash-container { position: sticky; top: 56px; z-index: 999; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-truck"></i> Log. Eventos</a>
    <div class="d-flex gap-2">
      <a href="/resumen" class="btn btn-sm btn-outline-light"><i class="bi bi-list-ul"></i> Resumen</a>
      <a href="/operacion/nueva" class="btn btn-sm btn-warning"><i class="bi bi-plus-circle"></i> Op.</a>
    </div>
  </div>
</nav>

<div class="flash-container">
  <div class="container-fluid px-2 pt-2">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show mb-1 py-2" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}
  </div>
</div>

<div class="container-fluid px-2 py-3">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
