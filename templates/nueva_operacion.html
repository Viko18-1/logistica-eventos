{% extends "base.html" %}
{% block title %}Nueva Operación{% endblock %}

{% block content %}
<h5 class="mb-3 fw-bold"><i class="bi bi-flag-fill text-primary"></i> Nueva Operación</h5>
<div class="card">
  <div class="card-body">
    <form method="POST" action="/operacion/nueva">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nombre de la operación *</label>
        <input type="text" name="nombre" class="form-control form-control-lg"
               placeholder="Ej: Buque COSCO – Puerto Ushuaia" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Descripción (opcional)</label>
        <textarea name="descripcion" class="form-control" rows="2"
                  placeholder="Datos adicionales, referencia, etc."></textarea>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary btn-lg">
          <i class="bi bi-play-fill"></i> Iniciar Operación
        </button>
      </div>
    </form>
  </div>
</div>
<div class="text-center mt-3">
  <a href="/" class="text-muted small"><i class="bi bi-arrow-left"></i> Volver</a>
</div>
{% endblock %}
